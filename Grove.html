    const mkNav=(key,label,icon)=>({label,icon,weight:route===key?'600':'500',color:route===key?'var(--accent)':'var(--ink-subtle)',onClick:()=>this.go(key)});
    const navLeft=[ mkNav('home','Home','M3 10.5 12 3l9 7.5M5 9v11h14V9'), mkNav('history','History','M12 7v5l3 2M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z') ];
    const navRight=[ mkNav('reports','Reports','M3 21h18M7 21V11M12 21V5M17 21v-8'), mkNav('bills','Bills','M6 3h12v18l-3-2-3 2-3-2-3 2zM9 8h6M9 12h6') ];

    // home
    const greeting='Hi, '+(s.user.name||'there');
    const dateLine=MONF[new Date().getMonth()]+' '+new Date().getDate()+' · '+P.left+' days left';
    const homeVariants=[{k:'ring',label:'Ring'},{k:'hero',label:'Focus'},{k:'grid',label:'Grid'}].map(v=>({label:v.label, bg:s.homeVariant===v.k?'var(--ink)':'transparent', fg:s.homeVariant===v.k?'var(--canvas)':'var(--ink-subtle)', onClick:()=>this.set({homeVariant:v.k})}));
    const homeRing=s.homeVariant==='ring', homeHero=s.homeVariant==='hero', homeGrid=s.homeVariant==='grid';
    const statTiles=[
      {label:'TODAY', value:this.fmt0(D.spentToday), sub:'spent today', color:'var(--ink)'},
      {label:'BUDGET LEFT', value:this.fmt0(D.budgetLeft), sub:'this period', color:D.budgetLeft<0?'var(--error)':'var(--ink)'},
      {label:'BILLS DUE', value:this.fmt0(D.unpaidTotal), sub:D.unpaidBills.length+' upcoming', color:'var(--ink)'},
      {label:'DAILY AVG', value:this.fmt0(D.dailyAvg), sub:'over '+P.elapsed+' days', color:'var(--ink)'},
    ];
    const recentRows=s.expenses.slice(0,4).map(e=>({ title:e.category, meta:(e.note?e.note+' · ':'')+this.relDay(e.date)+' · '+this.timeStr(e.date), amount:(e.category==='Income'?'+':'')+this.fmt(e.amount), amtColor:e.category==='Income'?'var(--success)':'var(--ink)', dot:CATCOLOR[e.category], onClick:()=>this.editExpense(e.id) }));

    const out={
      theme:s.theme, rootRef:this._rootRef, isOnboarding, isAdd, inApp, isHome, isHistory, isBills, isReports, isBudget, isSettings, isCurrency,
      showNav: inApp && !isCurrency,
      curSymbol:c.symbol,
      goSettings:()=>this.go('settings'), goHistory:()=>this.go('history'), openAdd:()=>this.openAdd(),
      navLeft, navRight,
      // onboarding
      obStep0:obStep===0, obStep1:obStep===1, obStep2:obStep===2, obStep3:obStep===3,
      obCanBack:obStep>0, obShowDots:obStep>=0,
      obNext:()=>this.obNext(), obBack:()=>this.obBack(), obSkip:()=>this.obSkip(), obFinish:()=>this.obFinish(),
      obPresets, obResetOpts, obDots, obBudgetDisplay:new Intl.NumberFormat(c.locale).format(s.obBudget),
      obSummaryTitle: s.user.name?("You're all set, "+s.user.name):"You're all set",
      obSumBudget:this.fmt0(s.obBudget), obSumReset:this.ordinal(s.obReset)+' of each month', obSumSafe:'~'+this.fmt0(obSafe),
      // home
      greeting, dateLine, homeVariants, homeRing, homeHero, homeGrid,
      ringEl:this.ringChart(D.spentPct, sc.c), safeEl:React.createElement(this.HeroNum,{value:D.safeToday, fmt:(x)=>this.fmt0(x)}),
      remainingLine:this.fmt0(D.budgetLeft)+' left · '+P.left+'d',
      statusLabel:D.status, statusColor:sc.c, statusBg:sc.bg, spentPctW:Math.round(D.spentPct*100)+'%',
      statTiles, recentRows, hasExpenses:s.expenses.length>0, noExpenses:s.expenses.length===0,
      // add
      addTitle:s.editId?'Edit expense':'New expense', addAmountStage:s.addStage==='amount', addDetailsStage:s.addStage==='details',
      keypadDisplay: s.keypad, keypadColor:this.amount()>0?'var(--ink)':'var(--ink-tert)',
      keypad:['1','2','3','4','5','6','7','8','9','.','0','⌫'].map(k=>({label:k, onClick:()=>this.press(k)})),
      addNext:()=>this.addNext(), addBack:()=>this.addBack(), addNextOpacity:this.amount()>0?1:0.4,
      closeAdd:()=>this.closeAdd(), saveExpense:()=>this.saveExpense(),
      catChips:CATS.map(cat=>({ label:cat, dot:CATCOLOR[cat], onClick:()=>this.setState({draftCat:cat}),
        bg:s.draftCat===cat?'color-mix(in srgb,'+CATCOLOR[cat]+' 18%, transparent)':'var(--s1)',
        fg:s.draftCat===cat?'var(--ink)':'var(--ink-muted)', bd:s.draftCat===cat?CATCOLOR[cat]:'var(--hair)' })),
      draftNote:s.draftNote, onNoteInput:(e)=>this.setState({draftNote:e.target.value}),
      draftDateLabel:s.draftDate?this.mdy(s.draftDate):this.mdy(new Date().toISOString()),
      openDatePicker:()=>this.openSheet('date',{sel:s.draftDate||new Date().toISOString(), view:s.draftDate||new Date().toISOString()}),
      flash:s.flash,
    };
    Object.assign(out, this.renderScreens(D));
    return out;
  }
  buildCalendar(viewISO){ const v=new Date(viewISO); const y=v.getFullYear(), m=v.getMonth();
    const startDow=new Date(y,m,1).getDay(); const dim=new Date(y,m+1,0).getDate();
    const cells=[]; for(let i=0;i<startDow;i++) cells.push(null);
    for(let d=1;d<=dim;d++) cells.push(new Date(y,m,d)); return {y,m,cells}; }

  renderScreens(D){
    const s=this.state, P=D.P, c=this.cur(), out={};

    // ===== HISTORY =====
    let list=s.expenses.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
    const q=s.histSearch.trim().toLowerCase(), f=s.histFilter;
    const filt=list.filter(e=>{
      if(q && !((e.note||'').toLowerCase().includes(q) || e.category.toLowerCase().includes(q))) return false;
      if(f==='All') return true;
      if(f==='This week'){ return (this.dayStart(new Date())-this.dayStart(new Date(e.date)))/86400000 < 7; }
      return e.category===f;
    });
    const groups=[], gmap={};
    filt.forEach(e=>{ const key=this.dayStart(new Date(e.date));
      if(!gmap[key]){ gmap[key]={label:this.relDay(e.date), total:0, rows:[]}; groups.push(gmap[key]); }
      if(e.category!=='Income') gmap[key].total+=e.amount;
      gmap[key].rows.push({ id:e.id, title:(e.note||e.category), meta:this.timeStr(e.date)+' · '+e.category,
        amount:(e.category==='Income'?'+':'')+this.fmt(e.amount), amtColor:e.category==='Income'?'var(--success)':'var(--ink)',
        dot:CATCOLOR[e.category], tx:(s.swipeId===e.id?-140:0),
        onTap:()=>{ if(s.swipeId===e.id) this.setState({swipeId:null}); else this.editExpense(e.id); },
        onEdit:()=>this.editExpense(e.id), onDelete:()=>this.deleteExpense(e.id) });
    });
    groups.forEach(g=>g.totalFmt=this.fmt(g.total));
    out.histGroups=groups;
    out.histFilters=['All','This week'].concat(CATS).map(name=>({ label:name,
      onClick:()=>this.setState({histFilter:name, swipeId:null}),
      bg:f===name?'var(--ink)':'var(--s1)', fg:f===name?'var(--canvas)':'var(--ink-muted)', bd:f===name?'var(--ink)':'var(--hair)' }));
    out.histSearch=s.histSearch; out.onHistSearch=(e)=>this.setState({histSearch:e.target.value, swipeId:null});
    out.histCount=s.expenses.length+' '+(s.expenses.length===1?'entry':'entries');
    out.histHasResults=filt.length>0; out.histEmpty=filt.length===0;
    out.histEmptySub=q?'Try a shorter search.':'Try a different category filter.';

    // ===== BILLS =====
    const monLabel=MON[new Date().getMonth()];
    out.billsMonthLabel=monLabel+' BILLS';
    out.billsUnpaid=D.unpaidBills.length+' unpaid';
    out.billsRecurringTotal=this.fmt0(D.billsTotal);
    out.billsPaidTotal=this.fmt0(D.paidTotal)+' paid';
    out.billsRemainingTotal=this.fmt0(D.unpaidTotal)+' remaining';
    out.billsPaidPctW=(D.billsTotal>0?Math.round(D.paidTotal/D.billsTotal*100):0)+'%';
    const sortedBills=s.bills.slice().sort((a,b)=>a.dueDay-b.dueDay);
    out.billRows=sortedBills.map(b=>{ const st=this.billStatus(b);
      return { id:b.id, name:b.name, dueLabel:'Due '+this.billDue(b), statusLabel:st.label, statusColor:st.color,
        amount:this.fmt0(b.amount), paid:b.paid, tx:(s.swipeId===b.id?-80:0),
        check:b.paid?'var(--success)':'transparent', checkBd:b.paid?'var(--success)':'var(--hair-strong)', tickColor:b.paid?'#fff':'transparent',
        nameStyle:b.paid?'line-through':'none', nameColor:b.paid?'var(--ink-subtle)':'var(--ink)',
        onTap:()=>{ if(s.swipeId===b.id) this.setState({swipeId:null}); else this.toggleBill(b.id); },
        onDelete:()=>this.deleteBill(b.id) };
    });
    out.billsHas=s.bills.length>0; out.billsEmpty=s.bills.length===0;
    out.openAddBill=()=>this.openSheet('addbill',{name:'',amount:'',dueDay:'15'});

    // ===== REPORTS =====
    const rangeFilter=(e)=>{ const diff=(this.dayStart(new Date())-this.dayStart(new Date(e.date)))/86400000;
      if(s.repRange==='week') return diff<7;
      if(s.repRange==='3months') return diff<90;
      return D.inP(e.date); };
    const rspend=s.expenses.filter(e=>e.category!=='Income' && rangeFilter(e));
    const catTot={}; rspend.forEach(e=>catTot[e.category]=(catTot[e.category]||0)+e.amount);
    const totalSpent=rspend.reduce((a,e)=>a+e.amount,0);
    const catList=Object.keys(catTot).map(cat=>({cat, amount:catTot[cat], color:CATCOLOR[cat]})).sort((a,b)=>b.amount-a.amount);
    const pieData=catList.map(d=>({cat:d.cat, amount:d.amount, color:d.color, active:s.slice===d.cat, onClick:()=>this.setState({slice:s.slice===d.cat?null:d.cat})}));
    out.repHasData=totalSpent>0; out.repEmpty=totalSpent===0;
    out.pieEl=this.pieChart(pieData, totalSpent);
    out.repSpentTotal=this.fmt0(totalSpent);
    out.repMonthLabel=MONF[new Date().getMonth()]+' '+new Date().getFullYear();
    out.repRanges=[{k:'week',l:'This week'},{k:'month',l:'This month'},{k:'3months',l:'3 months'}].map(r=>({label:r.l, onClick:()=>this.setState({repRange:r.k, slice:null}), bg:s.repRange===r.k?'var(--ink)':'var(--s1)', fg:s.repRange===r.k?'var(--canvas)':'var(--ink-muted)', bd:s.repRange===r.k?'var(--ink)':'var(--hair)'}));
    const sel=s.slice?catList.find(d=>d.cat===s.slice):null;
    out.repHasSlice=!!sel; out.repNoSlice=!sel;
    out.repSliceName=sel?sel.cat:''; out.repSliceAmt=sel?this.fmt0(sel.amount):''; out.repSlicePct=sel?Math.round(sel.amount/totalSpent*100)+'%':'';
    out.repSliceColor=sel?sel.color:'var(--ink)';
    out.repBreakdown=catList.map(d=>({cat:d.cat, color:d.color, amount:this.fmt0(d.amount), pct:Math.round(d.amount/totalSpent*100)+'%', barW:Math.round(d.amount/totalSpent*100)+'%'}));
    // pace
    const days=[]; let maxv=0;
    for(let i=0;i<P.elapsed;i++){ const dd=new Date(P.start); dd.setDate(dd.getDate()+i);
      const tot=s.expenses.filter(e=>e.category!=='Income' && this.dayStart(new Date(e.date))===this.dayStart(dd)).reduce((a,e)=>a+e.amount,0);
      maxv=Math.max(maxv,tot); days.push({d:new Date(dd), amount:tot}); }
    maxv=Math.max(maxv, D.safePerDay*1.2, 1);
    const paceDays=days.map((x,i)=>({amount:x.amount, over:x.amount>D.safePerDay && D.safePerDay>0, active:s.paceSel===i, onClick:()=>this.setState({paceSel:s.paceSel===i?null:i})}));
    out.paceEl=this.paceChart(paceDays, maxv, D.safePerDay, maxv);
    out.repAvgDay=this.fmt0(D.dailyAvg); out.repSafeDay=this.fmt0(D.safePerDay);
    const ps=s.paceSel!=null?days[s.paceSel]:null;
    out.paceTip=ps?(this.md(ps.d.toISOString())+' · '+this.fmt(ps.amount)):'';
    out.paceHasTip=!!ps;
    // MoM
    const byMonth={}; s.expenses.filter(e=>e.category!=='Income').forEach(e=>{ const d=new Date(e.date); byMonth[d.getFullYear()+'-'+d.getMonth()]=(byMonth[d.getFullYear()+'-'+d.getMonth()]||0)+e.amount; });
    const pStart=P.start; const moms=[];
    for(let i=5;i>=0;i--){ const d=new Date(pStart.getFullYear(),pStart.getMonth()-i,1); moms.push({label:MON[d.getMonth()], total:byMonth[d.getFullYear()+'-'+d.getMonth()]||0, current:i===0, idx:d.getMonth()}); }
    out.momEl=this.momChart(moms);
    const curT=moms[5].total, prevT=moms[4].total, prevM=MON[moms[4].idx];
    out.momCurrent=this.fmt0(curT);
    if(prevT>0){ const pc=Math.round((curT-prevT)/prevT*100); out.momPctLabel=(curT<=prevT?'↓ ':'↑ ')+Math.abs(pc)+'% vs '+prevM; out.momColor=curT<=prevT?'var(--success)':'var(--warn)'; }
    else { out.momPctLabel='No '+prevM+' data yet'; out.momColor='var(--ink-subtle)'; }
    out.topCats=catList.slice(0,5).map(d=>({cat:d.cat, color:d.color, amount:this.fmt0(d.amount)}));
    out.topHas=catList.length>0;

    // ===== BUDGET =====
    out.budMonthly=this.fmt0(s.budget);
    const allocated=CATS.filter(x=>x!=='Income').reduce((a,cat)=>a+(s.catLimits[cat]||0),0);
    out.budAllocated=this.fmt0(allocated)+' allocated'; out.budFree=this.fmt0(Math.max(0,s.budget-allocated))+' free';
    out.budCats=CATS.filter(x=>x!=='Income').map(cat=>{ const lim=s.catLimits[cat]||0;
      const spent=s.expenses.filter(e=>e.category===cat && D.inP(e.date)).reduce((a,e)=>a+e.amount,0);
      return { cat, color:CATCOLOR[cat], label:this.fmt0(spent)+' / '+(lim>0?this.fmt0(lim):'—'),
        barW:lim>0?Math.min(100,Math.round(spent/lim*100))+'%':'0%', over:lim>0&&spent>lim,
        onClick:()=>this.openSheet('category',{cat, val:lim}) };
    });
    out.budRecurring=s.bills.slice().sort((a,b)=>a.dueDay-b.dueDay).map(b=>({name:b.name, day:'Day '+b.dueDay, amount:this.fmt0(b.amount)}));
    out.budRecHas=s.bills.length>0; out.budRecEmpty=s.bills.length===0;
    out.openEditBudget=()=>this.openSheet('budget',{val:s.budget});

    // ===== SETTINGS =====
    out.userInitial=(s.user.name||'G').trim().charAt(0).toUpperCase()||'G';
    out.userName=s.user.name||'Add your name';
    out.settingsSub=c.code+' · Resets on the '+this.ordinal(s.resetDay);
    out.darkOn=s.theme==='dark'; out.dailyOn=s.prefs.dailyNudge; out.billAlertOn=s.prefs.billAlerts;
    out.darkToggle=()=>this.toggleTheme(); out.dailyToggle=()=>this.togglePref('dailyNudge'); out.billToggle=()=>this.togglePref('billAlerts');
    out.darkKnob=s.theme==='dark'?'translateX(20px)':'translateX(0)'; out.darkTrack=s.theme==='dark'?'var(--accent)':'var(--hair-strong)';
    out.dailyKnob=s.prefs.dailyNudge?'translateX(20px)':'translateX(0)'; out.dailyTrack=s.prefs.dailyNudge?'var(--accent)':'var(--hair-strong)';
    out.billKnob=s.prefs.billAlerts?'translateX(20px)':'translateX(0)'; out.billTrack=s.prefs.billAlerts?'var(--accent)':'var(--hair-strong)';
    out.resetDayLabel=this.ordinal(s.resetDay)+' of month';
    out.currencyName=c.name; out.currencyLine=c.symbol+' '+c.code;
    out.goBudget=()=>this.go('budget'); out.goCurrency=()=>this.go('currency');
    out.openResetSheet=()=>this.openSheet('reset',{day:String(s.resetDay)});
    out.openNameSheet=()=>this.openSheet('name',{name:s.user.name});
    out.replay=()=>this.replayOnboarding();

    // ===== CURRENCY =====
    out.currencyList=Object.keys(CURRENCIES).map(code=>{ const cc=CURRENCIES[code];
      return { code:cc.code, name:cc.name, ex:cc.ex, active:s.currency===code,
        bg:s.currency===code?'var(--s2)':'transparent', bd:s.currency===code?'var(--accent)':'var(--hair)',
        check:s.currency===code?1:0, onClick:()=>this.setCurrency(code) }; });
    out.goSettingsBack=()=>this.go('settings');

    // ===== SHEETS =====
    out.sheetOpen=!!s.sheet; out.closeSheet=()=>this.closeSheet();
    out.sheetIsDate=s.sheet==='date'; out.sheetIsBill=s.sheet==='addbill'; out.sheetIsBudget=s.sheet==='budget';
    out.sheetIsCat=s.sheet==='category'; out.sheetIsName=s.sheet==='name'; out.sheetIsReset=s.sheet==='reset';
    const sd=s.sheetDraft;
    // date picker
    if(s.sheet==='date'){ const cal=this.buildCalendar(sd.view||new Date().toISOString());
      out.calMonthLabel=MONF[cal.m]+' '+cal.y;
      out.calDays=cal.cells.map((d,i)=>{ if(!d) return {empty:true, key:'e'+i};
        const isSel=sd.sel && this.dayStart(d)===this.dayStart(new Date(sd.sel));
        const isToday=this.dayStart(d)===this.dayStart(new Date());
        const future=this.dayStart(d)>this.dayStart(new Date());
        return { empty:false, key:'d'+i, day:d.getDate(),
          bg:isSel?'var(--accent)':'transparent', fg:isSel?'#fff':(future?'var(--ink-tert)':'var(--ink)'),
          bd:isToday&&!isSel?'var(--hair-strong)':'transparent', fw:isSel?'600':(isToday?'600':'400'),
          onClick:future?(()=>{}):(()=>this.setDraft({sel:d.toISOString()})) };
      });
      out.calPrev=()=>{ const v=new Date(sd.view||new Date()); v.setMonth(v.getMonth()-1); this.setDraft({view:v.toISOString()}); };
      out.calNext=()=>{ const v=new Date(sd.view||new Date()); v.setMonth(v.getMonth()+1); this.setDraft({view:v.toISOString()}); };
      out.dateDone=()=>{ this.setState({draftDate:sd.sel}); this.closeSheet(); };
      out.calWeekdays=['S','M','T','W','T','F','S'];
    }
    // add bill
    out.billName=sd.name||''; out.billAmount=sd.amount||''; out.billDueDay=sd.dueDay||'';
    out.onBillName=(e)=>this.setDraft({name:e.target.value}); out.onBillAmount=(e)=>this.setDraft({amount:e.target.value.replace(/[^0-9.]/g,'')}); out.onBillDue=(e)=>this.setDraft({dueDay:e.target.value.replace(/[^0-9]/g,'')});
    out.saveBill=()=>this.saveBill();
    out.sheetCurSymbol=c.symbol;
    // monthly budget stepper
    out.budgetVal=this.fmt0(sd.val||0);
    out.budgetInc=()=>this.setDraft({val:(sd.val||0)+1000}); out.budgetDec=()=>this.setDraft({val:Math.max(0,(sd.val||0)-1000)});
    out.budgetPresets=[1000,2500,5000].map(p=>({label:'+'+new Intl.NumberFormat(c.locale).format(p), onClick:()=>this.setDraft({val:(sd.val||0)+p})}));
    out.saveBudget=()=>this.saveMonthlyBudget();
    // category budget stepper
    out.catSheetName=(sd.cat||'')+' budget'; out.catVal=this.fmt0(sd.val||0);
    out.catInc=()=>this.setDraft({val:(sd.val||0)+500}); out.catDec=()=>this.setDraft({val:Math.max(0,(sd.val||0)-500)});
    out.catPresets=[500,1000,2500].map(p=>({label:'+'+new Intl.NumberFormat(c.locale).format(p), onClick:()=>this.setDraft({val:(sd.val||0)+p})}));
    out.saveCat=()=>this.saveCategoryBudget();
    // name / reset
    out.nameVal=sd.name||''; out.onNameInput=(e)=>this.setDraft({name:e.target.value}); out.saveName=()=>this.saveName();
    out.resetVal=sd.day||''; out.onResetInput=(e)=>this.setDraft({day:e.target.value.replace(/[^0-9]/g,'')}); out.saveReset=()=>this.saveResetDay();

    return out;
  }
}
</script>
